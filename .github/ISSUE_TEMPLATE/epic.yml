name: Epic
description: High-level Epic aligned to tasks.md
labels: ["epic"]
body:
  - type: input
    id: objective
    attributes:
      label: Objective
      placeholder: What does this Epic accomplish?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      placeholder: What is in/out of scope?
  - type: input
    id: dex_path
    attributes:
      label: DEX Path(s)
      placeholder: "e.g. dex/01-product/game-systems"
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: Definition of done
